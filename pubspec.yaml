name: localizador_movil_emergencia
description: Aplicación de localizador móvil de emergencia
version: 1.0.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  flutter_material_design_icons: ^1.1.7296

  # Estado y DI
  provider: ^6.1.2
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Navegación
  go_router: ^14.2.0

  # Almacenamiento local
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.24
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Red
  dio: ^5.4.3+1
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # GPS
  geolocator: ^12.0.0

  # Permisos
  permission_handler: ^11.3.1

  # Enlaces/URLs
  url_launcher: ^6.3.0

  # Notificaciones
  flutter_local_notifications: ^17.2.1+2

  # Background service
  flutter_background_service: ^5.0.5

  # SMS
  flutter_sms: ^3.0.1

  # Contactos
  flutter_contacts: ^2.2.2

  # Variables de entorno
  flutter_dotenv: ^5.1.0

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1

  # Audio
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  injectable_generator: ^2.6.1
  drift_dev: ^2.19.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  mockito: ^5.4.4
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/sounds/
